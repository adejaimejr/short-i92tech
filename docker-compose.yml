services:
  shlink:
    image: shlinkio/shlink:4
    environment:
      - TZ=${TZ:-America/Sao_Paulo}
      - DEFAULT_DOMAIN=${SHLINK_DEFAULT_DOMAIN:-short.i92tecnologia.com.br}
      - IS_HTTPS_ENABLED=${SHLINK_IS_HTTPS_ENABLED:-true}
      - TRUSTED_PROXIES=${SHLINK_TRUSTED_PROXIES:-*}
      - DB_DRIVER=${SHLINK_DB_DRIVER:-postgres}
      - DB_HOST=${SHLINK_DB_HOST}
      - DB_PORT=${SHLINK_DB_PORT:-5432}
      - DB_NAME=${SHLINK_DB_NAME:-shlink}
      - DB_USER=${SHLINK_DB_USER}
      - DB_PASSWORD=${SHLINK_DB_PASSWORD}
      - INITIAL_API_KEY=${SHLINK_INITIAL_API_KEY}
      - GEOLITE_LICENSE_KEY=${SHLINK_GEOLITE_LICENSE_KEY:-}
    networks:
      - network_swarm_public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s
      labels:
        - traefik.enable=true
        - traefik.http.routers.shlink.rule=Host(`short.i92tecnologia.com.br`)
        - traefik.http.routers.shlink.entrypoints=websecure
        - traefik.http.routers.shlink.tls=true
        - traefik.http.routers.shlink.tls.certresolver=letsencryptresolver
        - traefik.http.routers.shlink.service=shlink
        - traefik.http.services.shlink.loadbalancer.server.port=8080
        - traefik.docker.network=network_swarm_public
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/rest/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  network_swarm_public:
    external: true
